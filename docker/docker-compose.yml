version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: leanpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: leanpilot
      POSTGRES_PASSWORD: leanpilot
      POSTGRES_DB: leanpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
