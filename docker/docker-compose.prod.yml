version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: leanpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-leanpilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-leanpilot}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-leanpilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    container_name: leanpilot-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-leanpilot}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-leanpilot}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile.web
    container_name: leanpilot-web
    restart: unless-stopped
    environment:
      API_URL: http://api:3001
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: leanpilot-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
