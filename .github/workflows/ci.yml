name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leanpilot
          POSTGRES_PASSWORD: leanpilot
          POSTGRES_DB: leanpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://leanpilot:leanpilot@localhost:5432/leanpilot_test

      - name: Lint
        run: npm run lint --if-present

      - name: TypeScript check (API)
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Unit tests
        run: npm run test --workspace=apps/api --if-present
        env:
          DATABASE_URL: postgresql://leanpilot:leanpilot@localhost:5432/leanpilot_test
          JWT_SECRET: test-secret-for-ci

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          API_URL: http://localhost:3001

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/leanpilot
            git pull origin main
            docker compose -f docker/docker-compose.prod.yml build
            docker compose -f docker/docker-compose.prod.yml up -d
            # Run migrations
            docker compose -f docker/docker-compose.prod.yml exec -T api npx prisma migrate deploy
            echo "Deploy complete at $(date)"
